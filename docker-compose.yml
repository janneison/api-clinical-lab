services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    env_file:
      - config/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: clinical_lab
      DB_USERNAME: api_user
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "git config --global --add safe.directory /app &&
             composer update --no-interaction --no-progress &&
             php /app/database/seed.php &&
             php /app/database/seed_exam_catalog.php &&
             php /app/database/seed_exam_catalog_labs.php &&
             php /app/database/seed_health_centers.php &&
             php /app/database/seed_real_results.php &&
             php -S 0.0.0.0:8080 -t public public/router.php"

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: clinical_lab
      MYSQL_USER: api_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "api_user", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
